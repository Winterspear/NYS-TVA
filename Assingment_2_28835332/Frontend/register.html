<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <header>
            <div class="container">
                <div class="header-content">
                    <h1>Register</h1>
                    <nav>
                        <a href="home.html">Home</a>
                        <a href="portal.html">Login</a>
                    </nav>
                </div>
            </div>
        </header>
        <main>
            <section class="auth-section">
                <div class="container">
                    <div class="auth-box">
                        <h2>Create Account</h2>
                        <form id="register-form">
                            <label for="forename">Forename:</label>
                            <input type="text" id="forename" name="forename" required>
                            <label for="surname">Surname:</label>
                            <input type="text" id="surname" name="surname" required>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                            <label for="password">Password:</label>
                            <input type="password" id="password" name="password" minlength="8"
                                   required>
                            <label for="confirm">Confirm Password:</label>
                            <input type="password" id="confirm" name="confirm" minlength="8"
                                   required>
                            <label for="licence">Licence number:</label>
                            <input type="text" id="licence" name="licence" required>
                            <label for="dateofbirth">Date of Birth:</label>
                            <input type="date" id="dateofbirth" name="dateofbirth" required>
                            <label for="addressL1">Address Line 1:</label>
                            <input type="text" id="addressL1" name="addressL1" required>
                            <label for="addressL2">Address Line 2:</label>
                            <input type="text" id="addressL2" name="addressL2">
                            <label for="city">City:</label>
                            <input type="text" id="city" name="city" required>
                            <label for="state">State:</label>
                            <input type="text" id="state" name="state" required>
                            <label for="zip">ZIP Code:</label>
                            <input type="text" id="zip" name="zip" required>
                            <label for="vin">Vehicle Registration:</label>
                            <input type="text" id="vin" name="vin" required>
                            <label for="phone">Phone Number:</label>
                            <input type="tel" id="phone" name="phone" required>
                            <button type="submit" class="btn-primary">Register</button>
                        </form>
                        <p class="auth-link">Already have an account? <a href="portal.html">Login here</a></p>
                    </div>
                </div>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 New York Traffic Violations. All rights reserved.</p>
        </footer>
        <script src="js/register.js"></script>
</body>
</html>
