<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your View</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1>Your View</h1>
                <nav>
                    <a href="home.html">Home</a>
                    <a href="userportal.html">User Portal</a>
                    <a href="adminportal.html">Admin Portal</a>
                </nav>
            </div>
        </div>
    </header>
    <main>
        <section class="user-view-section">
            <div class="container">
                <h2>Your Traffic Violations</h2>
                <div id="violations-list">
                    <script>
                        const API_URL = "http://127.0.0.1:8001"
                        async function loadViolations() {
                            const token = localStorage.getItem('token')
                            const list = document.getElementById('violations-list');
                            list.innerHTML = '<p class="Loading">Loading Violations... </p>';
                            try {
                                const responce = await fetch(`${API_URL}/violations/me/violations`, {
                                    headers: {
                                        Authorization: `Bearer ${token}`
                                    }
                                });
                                console.log("TOKEN: ", localStorage.getItem("token"));
                                if (!responce.ok) {
                                    throw new Error('Failed to fetch violations');
                                }
                                const violations = await responce.json();
                                if (violations.length === 0) {
                                    list.innerHTML = '<p class="NoViolations">No violations found.</p>';
                                    return;
                                }
                                violations.forEach(violation => {
                                    const div = document.createElement('div');
                                    div.className = "violation-card"
                                    div.innerHTML = `
                                        <p><strong>Date:</strong> ${violation.ViolationDateTime}</p>
                                        <p><strong>You were:</strong> ${violation.distance} <strong> miles </strong> ${violation.direction} <strong> of </strong> ${violation.Landmark} <strong> on the </strong> ${violation.road}</p>
                                        <p><strong>Details:</strong> ${violation.ViolationDetails}</p>
                                        <p><strong>Officer's Personnel Number':</strong> ${violation.personnelNumber}</p>
                                    `;
                                    list.appendChild(div);
                                });
                            } catch (error) {
                                list.innerHTML = `<p class="Error">Error: ${error.message}</p>`;
                            }
                        }
                        loadViolations();
                    </script>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 New York Traffic Violations. All rights reserved.</p>
    </footer>

</body>
</html>
