<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrative Oversight</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <h1>Edit Violation</h1>
    <form id="edit-form">
        <input type="text" id="ViolationDateTime" placeholder="Violation Date and Time" />
        <input type="text" id="Distance" placeholder="Distance" />
        <input type="text" id="Direction" placeholder="Direction" />
        <input type="text" id="Landmark" placeholder="Landmark" />
        <input type="text" id="Road" placeholder="Road" />
        <input type="text" id="Details" placeholder="Details" />
        <input type="text" id="PersonnelNumber" placeholder="Personnel Number" />
        <button type="submit">Save Changes</button>
    </form>
    <script src="js/editViolation.js"></script>
</body>
</html>
